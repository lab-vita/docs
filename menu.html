<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{APP_TITLE}}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            color: #333;
            background: #f5f5f5;
            padding: 20px;
        }

        .menu-wrap {
            max-width: 640px;
            margin: 0 auto;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }

        .process-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 18px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.1s;
            text-decoration: none;
            color: inherit;
        }

        .process-card:hover {
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
            transform: translateY(-1px);
        }

        .process-card:active {
            transform: translateY(0);
        }

        .process-icon {
            font-size: 28px;
            line-height: 1;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eef9fe;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .process-info {
            flex: 1;
            min-width: 0;
        }

        .process-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2px;
        }

        .process-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.4;
        }

        .process-arrow {
            color: #ccc;
            font-size: 18px;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="menu-wrap">
    <h1>{{APP_TITLE}}</h1>
    <div class="subtitle">Выберите процесс для подачи заявки</div>
    <div id="processList"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id') || '';
    const authToken = urlParams.get('auth_token') || '';
    const processes = {
    {
        PROCESSES_JSON
    }
    }
    ;

    function render() {
        const container = document.getElementById('processList');
        const keys = Object.keys(processes);

        if (keys.length === 0) {
            container.innerHTML = '<div class="empty-state">Пока нет доступных процессов</div>';
            return;
        }

        container.innerHTML = keys.map(key => {
            const p = processes[key];
            return `
                <a class="process-card" href="?process=${key}&user_id=${encodeURIComponent(userId)}&auth_token=${encodeURIComponent(authToken)}">
                    <div class="process-icon">${p.icon}</div>
                    <div class="process-info">
                        <div class="process-title">${p.title}</div>
                        <div class="process-desc">${p.description}</div>
                    </div>
                    <div class="process-arrow">›</div>
                </a>
            `;
        }).join('');
    }

    render();
</script>
</body>
</html>
