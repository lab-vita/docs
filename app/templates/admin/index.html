<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление процессами</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            font-size: 14px; color: #333; background: #f0f2f5; min-height: 100vh;
        }
        .topbar {
            background: #fff; border-bottom: 1px solid #e8e8e8;
            padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
        }
        .topbar h1 { font-size: 17px; font-weight: 600; color: #1a1a1a; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 6px; font-size: 13px;
            font-weight: 500; cursor: pointer; border: none; text-decoration: none;
            transition: background .15s;
        }
        .btn-primary { background: #2fc6f6; color: #fff; }
        .btn-primary:hover { background: #1ab3e8; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn-ghost { background: #f5f5f5; color: #333; }
        .btn-ghost:hover { background: #e8e8e8; }
        .btn-danger { background: #fff0f0; color: #c62828; }
        .btn-danger:hover { background: #ffebee; }
        .content { padding: 24px; max-width: 900px; margin: 0 auto; }
        .card {
            background: #fff; border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 12px;
            padding: 16px 20px; display: flex; align-items: center; gap: 16px;
        }
        .card-icon {
            font-size: 24px; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            background: #eef9fe; border-radius: 8px; flex-shrink: 0;
        }
        .card-info { flex: 1; min-width: 0; }
        .card-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
        .card-desc { font-size: 12px; color: #888; }
        .card-key { font-size: 11px; color: #aaa; font-family: monospace; margin-top: 2px; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 11px; font-weight: 500; flex-shrink: 0;
        }
        .badge-active { background: #e8f5e9; color: #2e7d32; }
        .badge-inactive { background: #f5f5f5; color: #999; }
        .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .empty {
            text-align: center; padding: 60px 20px; color: #aaa; font-size: 13px;
        }
        .empty a { color: #2fc6f6; text-decoration: none; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>Управление процессами</h1>
    <a href="/admin/process/new" class="btn btn-primary">+ Добавить процесс</a>
</div>
<div class="content">
    <div id="list"></div>
</div>

<script>
    const processes = __PROCESSES_JSON__;

    function render() {
        const container = document.getElementById('list');
        if (!processes.length) {
            container.innerHTML = `<div class="empty">
                Нет процессов. <a href="/admin/process/new">Создать первый</a>
            </div>`;
            return;
        }
        container.innerHTML = processes.map(p => `
            <div class="card" id="card_${p.id}">
                <div class="card-icon">${p.icon}</div>
                <div class="card-info">
                    <div class="card-title">${p.title}</div>
                    <div class="card-desc">${p.description || ''}</div>
                    <div class="card-key">key: ${p.key}</div>
                </div>
                <span class="badge ${p.is_active ? 'badge-active' : 'badge-inactive'}">
                    ${p.is_active ? 'Активен' : 'Выключен'}
                </span>
                <div class="card-actions">
                    <a href="/admin/process/${p.id}" class="btn btn-sm btn-ghost">Редактировать</a>
                    <button class="btn btn-sm btn-ghost" onclick="toggle(${p.id})">
                        ${p.is_active ? 'Выключить' : 'Включить'}
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="del(${p.id}, '${p.title}')">Удалить</button>
                </div>
            </div>
        `).join('');
    }

    async function toggle(id) {
        const resp = await fetch(`/admin/process/${id}/toggle`, {method: 'POST'});
        const data = await resp.json();
        if (data.success) location.reload();
    }

    async function del(id, title) {
        if (!confirm(`Удалить процесс "${title}"? Это действие нельзя отменить.`)) return;
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = `/admin/process/${id}/delete`;
        document.body.appendChild(form);
        form.submit();
    }

    render();
</script>
</body>
</html>
