<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>__PROCESS_TITLE__</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            font-size: 14px; color: #333; background: #f5f5f5; padding: 20px;
        }
        .form-card {
            background: #fff; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
            padding: 24px; max-width: 560px; margin: 0 auto;
        }
        .form-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
        }
        .back-btn {
            background: none; border: none; color: #aaa; font-size: 20px;
            cursor: pointer; padding: 0 4px; line-height: 1;
        }
        .back-btn:hover { color: #555; }
        h2 { font-size: 18px; font-weight: 600; color: #1a1a1a; }
        .field { margin-bottom: 16px; }
        label {
            display: block; font-size: 13px; color: #666;
            margin-bottom: 6px; font-weight: 500;
        }
        label .req { color: #e53935; }
        input[type="text"], input[type="number"], input[type="date"],
        textarea, select {
            width: 100%; border: 1px solid #d9d9d9; border-radius: 6px;
            padding: 8px 12px; font-size: 14px; color: #333;
            outline: none; transition: border-color .2s;
            font-family: inherit;
        }
        textarea { resize: vertical; min-height: 80px; }
        input:focus, textarea:focus, select:focus { border-color: #2fc6f6; }
        input.error, textarea.error, select.error { border-color: #e53935; }
        .date-range { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        /* Positions */
        .positions-label { font-size: 13px; color: #666; font-weight: 500; margin-bottom: 8px; }
        .position-row {
            display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
        }
        .position-row input[type="text"] { flex: 2; }
        .position-row input[type="number"] { flex: 1; min-width: 90px; }
        .btn-remove {
            background: none; border: none; color: #bbb; font-size: 18px;
            cursor: pointer; padding: 4px 6px; border-radius: 4px; line-height: 1;
            transition: color .2s;
        }
        .btn-remove:hover { color: #e53935; }
        .btn-add {
            background: none; border: 1px dashed #2fc6f6; color: #2fc6f6;
            border-radius: 6px; padding: 7px 14px; font-size: 13px;
            cursor: pointer; width: 100%; margin-top: 4px; transition: background .2s;
        }
        .btn-add:hover { background: #f0fbff; }
        .total-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0;
        }
        .total-label { font-size: 13px; color: #666; }
        .total-amount { font-size: 18px; font-weight: 700; color: #1a1a1a; }
        /* Submit */
        .btn-submit {
            width: 100%; background: #2fc6f6; color: #fff;
            border: none; border-radius: 6px; padding: 11px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            margin-top: 20px; transition: background .2s;
        }
        .btn-submit:hover { background: #1ab3e8; }
        .btn-submit:disabled { background: #b0e0f7; cursor: not-allowed; }
        .msg {
            margin-top: 14px; padding: 10px 14px; border-radius: 6px;
            font-size: 13px; display: none;
        }
        .msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
        .msg.error { background: #ffebee; color: #c62828; display: block; }
        .loading { text-align: center; padding: 40px; color: #aaa; font-size: 13px; }
    </style>
</head>
<body>
<div class="form-card">
    <div class="form-header">
        <button class="back-btn" onclick="history.back()" title="Назад">‹</button>
        <h2 id="formTitle">__PROCESS_TITLE__</h2>
    </div>
    <div id="formBody"><div class="loading">Загрузка...</div></div>
    <button class="btn-submit" id="submitBtn" style="display:none" onclick="submitForm()">
        Отправить заявку
    </button>
    <div class="msg" id="msg"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id') || '';
    const authToken = urlParams.get('auth_token') || '';
    const processKey = '__PROCESS_KEY__';

    // ── Рендереры полей ───────────────────────────────────────────────────────

    const renderers = {
        text(field) {
            return `<div class="field">
                <label>${field.label}${field.required ? ' <span class="req">*</span>' : ''}</label>
                <input type="text" id="field_${field.name}"
                    placeholder="${field.placeholder || ''}"
                    ${field.required ? 'required' : ''}>
            </div>`;
        },
        number(field) {
            return `<div class="field">
                <label>${field.label}${field.required ? ' <span class="req">*</span>' : ''}</label>
                <input type="number" id="field_${field.name}"
                    placeholder="${field.placeholder || ''}" min="0"
                    ${field.required ? 'required' : ''}>
            </div>`;
        },
        textarea(field) {
            return `<div class="field">
                <label>${field.label}${field.required ? ' <span class="req">*</span>' : ''}</label>
                <textarea id="field_${field.name}"
                    placeholder="${field.placeholder || ''}"
                    ${field.required ? 'required' : ''}></textarea>
            </div>`;
        },
        date(field) {
            return `<div class="field">
                <label>${field.label}${field.required ? ' <span class="req">*</span>' : ''}</label>
                <input type="date" id="field_${field.name}"
                    ${field.required ? 'required' : ''}>
            </div>`;
        },
        date_range(field) {
            return `<div class="field">
                <label>${field.label}${field.required ? ' <span class="req">*</span>' : ''}</label>
                <div class="date-range">
                    <input type="date" id="field_${field.name}_from"
                        placeholder="Начало" ${field.required ? 'required' : ''}>
                    <input type="date" id="field_${field.name}_to"
                        placeholder="Конец" ${field.required ? 'required' : ''}>
                </div>
            </div>`;
        },
        select(field) {
            const opts = (field.options || [])
                .map(o => `<option value="${o.value}">${o.label}</option>`)
                .join('');
            return `<div class="field">
                <label>${field.label}${field.required ? ' <span class="req">*</span>' : ''}</label>
                <select id="field_${field.name}" ${field.required ? 'required' : ''}>
                    <option value="">— выберите —</option>
                    ${opts}
                </select>
            </div>`;
        },
        positions(field) {
            return `<div class="field">
                <div class="positions-label">${field.label}${field.required ? ' <span class="req">*</span>' : ''}</div>
                <div id="positions">
                    <div class="position-row">
                        <input type="text" placeholder="Назначение" class="pos-name" oninput="calcTotal()">
                        <input type="number" placeholder="Сумма" class="pos-amount" min="0" oninput="calcTotal()">
                        <button class="btn-remove" onclick="removeRow(this)" title="Удалить">×</button>
                    </div>
                </div>
                <button class="btn-add" onclick="addRow()">+ Добавить позицию</button>
                <div class="total-row">
                    <span class="total-label">Итого:</span>
                    <span class="total-amount" id="total">0 ₽</span>
                </div>
            </div>`;
        }
    };

    // ── Сборщики значений ─────────────────────────────────────────────────────

    const collectors = {
        text: (f) => document.getElementById(`field_${f.name}`)?.value.trim() || '',
        number: (f) => parseFloat(document.getElementById(`field_${f.name}`)?.value) || 0,
        textarea: (f) => document.getElementById(`field_${f.name}`)?.value.trim() || '',
        date: (f) => document.getElementById(`field_${f.name}`)?.value || '',
        date_range: (f) => ({
            from: document.getElementById(`field_${f.name}_from`)?.value || '',
            to: document.getElementById(`field_${f.name}_to`)?.value || '',
        }),
        select: (f) => document.getElementById(`field_${f.name}`)?.value || '',
        positions: () => {
            const rows = document.querySelectorAll('.position-row');
            return Array.from(rows)
                .map(row => ({
                    name: row.querySelector('.pos-name').value.trim(),
                    amount: parseFloat(row.querySelector('.pos-amount').value) || 0,
                }))
                .filter(p => p.name && p.amount > 0);
        },
    };

    // ── Позиции ───────────────────────────────────────────────────────────────

    function addRow() {
        const row = document.createElement('div');
        row.className = 'position-row';
        row.innerHTML = `
            <input type="text" placeholder="Назначение" class="pos-name" oninput="calcTotal()">
            <input type="number" placeholder="Сумма" class="pos-amount" min="0" oninput="calcTotal()">
            <button class="btn-remove" onclick="removeRow(this)" title="Удалить">×</button>`;
        document.getElementById('positions').appendChild(row);
        row.querySelector('.pos-name').focus();
    }

    function removeRow(btn) {
        if (document.querySelectorAll('.position-row').length === 1) return;
        btn.parentElement.remove();
        calcTotal();
    }

    function calcTotal() {
        let total = 0;
        document.querySelectorAll('.pos-amount').forEach(a => total += parseFloat(a.value) || 0);
        const el = document.getElementById('total');
        if (el) el.textContent = total.toLocaleString('ru-RU') + ' ₽';
        return total;
    }

    // ── Инициализация формы ───────────────────────────────────────────────────

    let formConfig = null;

    async function loadForm() {
        try {
            const resp = await fetch(`/api/process/${processKey}`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            formConfig = await resp.json();

            document.getElementById('formTitle').textContent =
                formConfig.icon + ' ' + formConfig.title;

            const html = formConfig.fields.map(f => {
                const renderer = renderers[f.type] || renderers.text;
                return renderer(f);
            }).join('');

            document.getElementById('formBody').innerHTML = html || '<p>Форма не настроена</p>';
            document.getElementById('submitBtn').style.display = 'block';

            // Навешиваем calcTotal на первую строку позиций если есть
            document.querySelectorAll('.pos-name, .pos-amount').forEach(el => {
                el.addEventListener('input', calcTotal);
            });
        } catch (e) {
            document.getElementById('formBody').innerHTML =
                `<div class="msg error" style="display:block">Ошибка загрузки формы: ${e.message}</div>`;
        }
    }

    // ── Отправка формы ────────────────────────────────────────────────────────

    async function submitForm() {
        if (!formConfig) return;

        const fields = {};
        let valid = true;

        for (const f of formConfig.fields) {
            const collector = collectors[f.type] || collectors.text;
            const value = collector(f);

            if (f.required) {
                if (!value || (Array.isArray(value) && value.length === 0) ||
                    (typeof value === 'object' && !Array.isArray(value) && !value.from)) {
                    valid = false;
                    const el = document.getElementById(`field_${f.name}`);
                    if (el) el.classList.add('error');
                }
            }
            fields[f.name] = value;
        }

        if (!valid) {
            showMsg('Заполните все обязательные поля', 'error');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Отправляю...';

        try {
            const resp = await fetch('/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    process_key: processKey,
                    user_auth_id: authToken,
                    fields,
                }),
            });
            const data = await resp.json();

            if (data.success) {
                showMsg('Заявка отправлена! Процесс согласования запущен.', 'success');
                setTimeout(() => location.href = location.href.split('?')[0], 2500);
            } else {
                showMsg('Ошибка: ' + (data.error || 'попробуйте ещё раз'), 'error');
                btn.disabled = false;
                btn.textContent = 'Отправить заявку';
            }
        } catch (e) {
            showMsg('Ошибка соединения', 'error');
            btn.disabled = false;
            btn.textContent = 'Отправить заявку';
        }
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'msg ' + type;
    }

    loadForm();
</script>
</body>
</html>
