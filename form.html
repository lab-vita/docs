<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выдача наличных</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            color: #333;
            background: #f5f5f5;
            padding: 20px;
        }

        .form-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 24px;
            max-width: 560px;
            margin: 0 auto;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #2fc6f6;
        }

        input.error {
            border-color: #e53935;
        }

        .positions-label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .position-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .position-row input[type="text"] {
            flex: 2;
        }

        .position-row input[type="number"] {
            flex: 1;
            min-width: 90px;
        }

        .btn-remove {
            background: none;
            border: none;
            color: #bbb;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            line-height: 1;
            transition: color 0.2s;
        }

        .btn-remove:hover {
            color: #e53935;
        }

        .btn-add {
            background: none;
            border: 1px dashed #2fc6f6;
            color: #2fc6f6;
            border-radius: 6px;
            padding: 7px 14px;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            margin-top: 4px;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background: #f0fbff;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }

        .total-label {
            font-size: 13px;
            color: #666;
        }

        .total-amount {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .btn-submit {
            width: 100%;
            background: #2fc6f6;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 11px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #1ab3e8;
        }

        .btn-submit:disabled {
            background: #b0e0f7;
            cursor: not-allowed;
        }

        .msg {
            margin-top: 14px;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }

        .msg.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .msg.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
    </style>
</head>
<body>
<div class="form-card">
    <h2>💵 Выдача наличных</h2>

    <div class="field">
        <label>Название заявки *</label>
        <input type="text" id="title" placeholder="Например: Ремонт забора">
    </div>

    <div class="field">
        <div class="positions-label">Позиции *</div>
        <div id="positions">
            <div class="position-row">
                <input type="text" placeholder="Назначение" class="pos-name">
                <input type="number" placeholder="Сумма" class="pos-amount" min="0">
                <button class="btn-remove" onclick="removeRow(this)" title="Удалить">×</button>
            </div>
        </div>
        <button class="btn-add" onclick="addRow()">+ Добавить позицию</button>
    </div>

    <div class="total-row">
        <span class="total-label">Итого:</span>
        <span class="total-amount" id="total">0 ₽</span>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitForm()">Отправить заявку</button>
    <div class="msg" id="msg"></div>
</div>

<script>
    // Получаем параметры из URL (userId передаётся Битрикс24)
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id') || '';
    const authToken = urlParams.get('auth_token') || '';

    function addRow() {
        const row = document.createElement('div');
        row.className = 'position-row';
        row.innerHTML = `
            <input type="text" placeholder="Назначение" class="pos-name" oninput="calcTotal()">
            <input type="number" placeholder="Сумма" class="pos-amount" min="0" oninput="calcTotal()">
            <button class="btn-remove" onclick="removeRow(this)" title="Удалить">×</button>
        `;
        document.getElementById('positions').appendChild(row);
        row.querySelector('.pos-name').focus();
    }

    function removeRow(btn) {
        const rows = document.querySelectorAll('.position-row');
        if (rows.length === 1) return; // Минимум одна строка
        btn.parentElement.remove();
        calcTotal();
    }

    function calcTotal() {
        const amounts = document.querySelectorAll('.pos-amount');
        let total = 0;
        amounts.forEach(a => total += parseFloat(a.value) || 0);
        document.getElementById('total').textContent = total.toLocaleString('ru-RU') + ' ₽';
        return total;
    }

    // Считаем итог при вводе в первой строке
    document.querySelectorAll('.pos-name, .pos-amount').forEach(el => {
        el.addEventListener('input', calcTotal);
    });

    async function submitForm() {
        const title = document.getElementById('title').value.trim();
        if (!title) {
            showMsg('Укажите название заявки', 'error');
            document.getElementById('title').classList.add('error');
            return;
        }

        const rows = document.querySelectorAll('.position-row');
        const positions = [];
        let valid = true;

        rows.forEach(row => {
            const name = row.querySelector('.pos-name').value.trim();
            const amount = parseFloat(row.querySelector('.pos-amount').value) || 0;
            if (name && amount > 0) {
                positions.push({name, amount});
            } else if (name || amount) {
                valid = false;
            }
        });

        if (!valid || positions.length === 0) {
            showMsg('Заполните все позиции (название и сумму)', 'error');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Отправляю...';

        try {
            const resp = await fetch('/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    title,
                    positions,
                    user_id: userId,
                    auth_token: authToken,
                    user_auth_id: authToken
                })
            });
            const data = await resp.json();

            if (data.success) {
                showMsg('✅ Заявка отправлена! Процесс согласования запущен.', 'success');
                btn.textContent = 'Отправлено';
            } else {
                showMsg('Ошибка: ' + (data.error || 'попробуйте ещё раз'), 'error');
                btn.disabled = false;
                btn.textContent = 'Отправить заявку';
            }
        } catch (e) {
            showMsg('Ошибка соединения', 'error');
            btn.disabled = false;
            btn.textContent = 'Отправить заявку';
        }
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'msg ' + type;
    }
</script>
</body>
</html>
