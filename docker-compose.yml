version: "3.9"

services:
  bitrix24-business-process-document-generator:
    build: .
    container_name: bitrix24-business-process-document-generator
    restart: always
    ports:
      - "5001:5000"
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"